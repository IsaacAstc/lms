name: Deploy to GitHub Pages

# main 병합 시 자동 배포 + 작업 브랜치 push 시 테스트 배포 + 수동 실행.
on:
  push:
    branches:
      - main
      - claude/course-schedule-input-mcbdcv
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Secrets 값으로 firebase-config.js 생성 (저장소엔 커밋되지 않음).
      - name: Generate firebase-config.js
        run: |
          cat > js/firebase-config.js <<EOF
          export const firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}",
          };
          EOF

      - uses: actions/configure-pages@v5

      # 저장소 루트를 그대로 정적 사이트로 업로드.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deploy
        uses: actions/deploy-pages@v4
